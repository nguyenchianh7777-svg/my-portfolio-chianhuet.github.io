<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Detail — Nguyen Chi Anh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ DESIGN SYSTEM ═══ */
:root{
  --c-primary:#00E5FF;--c-secondary:#64FFDA;--c-accent:#00FFC6;
  --c-bg:#050B16;--c-surface:#0A192F;--c-surface2:#112240;
  --c-text:#FFFFFF;--c-text2:#B0BEC5;
  --c-border:rgba(0,229,255,.15);--c-glow:rgba(0,229,255,.28);
  --f-head:'Montserrat','Be Vietnam Pro',sans-serif;
  --f-ui:'Be Vietnam Pro',sans-serif;
  --f-body:'Roboto',sans-serif;
  --ease:.32s cubic-bezier(.4,0,.2,1);
  --proj-accent:#00E5FF; /* overridden per project */
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--f-body);overflow-x:hidden;line-height:1.65}
#bgCanvas{position:fixed;inset:0;z-index:0;opacity:.32;pointer-events:none}
.wrap{position:relative;z-index:1}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,11,22,.85);backdrop-filter:blur(22px);border-bottom:1px solid var(--c-border)}
.logo{font-family:var(--f-head);font-size:16px;font-weight:900;letter-spacing:3px;color:var(--c-primary)}
.logo em{color:#fff;font-style:normal}
.back-btn{display:flex;align-items:center;gap:8px;font-family:var(--f-ui);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--c-text2);text-decoration:none;padding:7px 16px;border:1px solid var(--c-border);border-radius:7px;transition:var(--ease)}
.back-btn:hover{color:var(--c-primary);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.06)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-proj-id{font-family:var(--f-head);font-size:11px;font-weight:800;letter-spacing:3px;color:var(--c-primary);background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);padding:5px 13px;border-radius:6px}

/* ═══ PART 1 — HERO ═══ */
.proj-hero{min-height:42vh;display:flex;align-items:flex-end;padding:120px 80px 48px;position:relative;overflow:hidden}
.hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--proj-accent-alpha,.08) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.035) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 72%)}
.hero-inner{max-width:900px;animation:fadeUp .7s ease-out both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
.proj-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-ui);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--proj-accent);background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);padding:4px 14px;border-radius:100px;margin-bottom:20px}
.proj-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--proj-accent);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.proj-h1{font-family:var(--f-head);font-size:clamp(32px,4.5vw,58px);font-weight:900;line-height:1.05;letter-spacing:-1.5px;margin-bottom:18px}
.proj-h1 span{-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.proj-cats{display:flex;gap:8px;flex-wrap:wrap}
.proj-cat{font-family:var(--f-ui);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--c-text2)}

/* ═══ META BAR ═══ */
.meta-bar{padding:0 80px 64px}
.meta-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:900px}
.meta-c{background:rgba(10,25,47,.8);border:1px solid var(--c-border);border-radius:12px;padding:18px 20px;backdrop-filter:blur(20px)}
.meta-lbl{font-family:var(--f-ui);font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--c-text2);margin-bottom:6px}
.meta-val{font-family:var(--f-ui);font-size:13px;font-weight:700;color:var(--proj-accent)}

/* ═══ DIVIDER ═══ */
.divl{height:1px;background:linear-gradient(90deg,transparent,var(--c-border),transparent);margin:0 80px}

/* ═══ PART 1 — INTRO BODY ═══ */
.intro-section{padding:64px 80px}
.part-label{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.part-num{font-family:var(--f-head);font-size:11px;font-weight:900;letter-spacing:3px;color:var(--proj-accent);background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);padding:5px 14px;border-radius:6px}
.part-title{font-family:var(--f-head);font-size:22px;font-weight:800;letter-spacing:-.5px}
.intro-grid{display:grid;grid-template-columns:1fr 380px;gap:36px;align-items:start}
/* overview card */
.overview-card{background:rgba(10,25,47,.8);border:1px solid var(--c-border);border-radius:16px;padding:32px;backdrop-filter:blur(20px)}
.card-ttl{font-family:var(--f-ui);font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--proj-accent);margin-bottom:14px}
.overview-card p{font-size:14px;color:var(--c-text2);line-height:1.8;margin-bottom:22px}
.objectives{list-style:none;display:flex;flex-direction:column;gap:10px}
.objectives li{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:var(--c-text2);line-height:1.6}
.objectives li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--proj-accent);flex-shrink:0;margin-top:7px;box-shadow:0 0 6px var(--proj-accent)}
/* highlights card */
.highlights-card{background:rgba(10,25,47,.8);border:1px solid var(--c-border);border-radius:16px;padding:28px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:14px}
.hl-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px}
.hl-icon{font-size:20px;margin-bottom:7px}
.hl-ttl{font-family:var(--f-ui);font-size:12px;font-weight:700;color:#fff;margin-bottom:4px}
.hl-txt{font-size:12px;color:var(--c-text2);line-height:1.6}

/* ═══ PART 2 — FILES ═══ */
.files-section{padding:64px 80px 88px;background:rgba(10,25,47,.18)}
.files-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:900px}
/* file card */
.file-card{background:rgba(10,25,47,.85);border:1px solid var(--c-border);border-radius:14px;padding:24px;backdrop-filter:blur(20px);transition:var(--ease);display:flex;flex-direction:column;gap:0}
.file-card:hover{border-color:rgba(0,229,255,.38);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.3),0 0 28px rgba(0,229,255,.07)}
.file-icon-wrap{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0}
.file-name{font-family:var(--f-ui);font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.3}
.file-desc{font-size:12px;color:var(--c-text2);line-height:1.6;margin-bottom:16px;flex:1}
.file-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.file-type-badge{font-family:var(--f-ui);font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.file-size{font-family:var(--f-ui);font-size:11px;color:var(--c-text2)}
/* download button */
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px;background:linear-gradient(135deg,var(--c-primary),var(--c-secondary));color:var(--c-bg);font-family:var(--f-ui);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border-radius:8px;text-decoration:none;transition:var(--ease);border:none;cursor:pointer;margin-top:auto}
.dl-btn:hover{box-shadow:0 0 24px rgba(0,229,255,.35);transform:translateY(-1px)}
.dl-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
/* placeholder state */
.dl-btn.placeholder{background:rgba(255,255,255,.05);color:var(--c-text2);border:1px dashed rgba(255,255,255,.15);pointer-events:none}
.dl-btn.placeholder:hover{transform:none;box-shadow:none}
/* upload note */
.upload-note{grid-column:1/-1;display:flex;align-items:center;gap:12px;background:rgba(0,229,255,.04);border:1px dashed rgba(0,229,255,.2);border-radius:12px;padding:16px 20px;font-family:var(--f-ui);font-size:12px;color:var(--c-text2)}
.upload-note svg{width:18px;height:18px;stroke:var(--c-primary);fill:none;stroke-width:1.8;flex-shrink:0}

/* ═══ PREV / NEXT ═══ */
.pn-bar{padding:48px 80px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--c-border)}
.pn-btn{display:flex;align-items:center;gap:10px;font-family:var(--f-ui);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--c-text2);text-decoration:none;padding:10px 20px;border:1px solid var(--c-border);border-radius:8px;transition:var(--ease)}
.pn-btn:hover{color:var(--c-primary);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.05)}
.pn-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pn-btn.hidden{opacity:0;pointer-events:none}
.pn-center{font-family:var(--f-head);font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.25)}

/* anim */
.anim{opacity:0;transform:translateY(16px);transition:opacity .55s ease,transform .55s ease}
.anim.vis{opacity:1;transform:none}

/* responsive */
@media(max-width:900px){
  nav,section,.intro-section,.meta-bar,.files-section,.pn-bar{padding-left:24px;padding-right:24px}
  .divl{margin:0 24px}
  .intro-grid{grid-template-columns:1fr}
  .files-grid{grid-template-columns:1fr 1fr}
  .meta-row{grid-template-columns:1fr 1fr}
}
@media(max-width:580px){
  .files-grid,.meta-row{grid-template-columns:1fr}
  .proj-h1{font-size:30px}
}
</style>
</head>

<script>
/* ══════════════════════════════════════════

══════════════════════════════════════════ */
const PROJECTS = {
  1:{
    num:"01",
    title:"Basic File & Folder Management",
    tag:"Digital Literacy · File Management",
    categories:["Digital Literacy","File Systems","Cloud Storage"],
    accent:"#00E5FF",
    accentAlpha:"rgba(0,229,255,.1)",
    gradient:"linear-gradient(135deg,#fff 0%,#00E5FF 55%,#64FFDA 100%)",
    meta:[
      {label:"Project Type",  value:"Practical Exercise"},
      {label:"Duration",      value:"Week 1 - 2"},
      {label:"Tools Used",    value:"Windows Explorer"},
      {label:"Deliverable",   value:"Documented Folder Structure"}
    ],
    overview:`Đây là dự án rèn luyện thao tác cơ bản trên hệ điều hành (Windows/macOS/Linux). Nó tập trung vào việc quản lý dữ liệu số, giúp người dùng hiểu cách máy tính tổ chức và lưu trữ thông tin thông qua sơ đồ cây (thư mục cha -> thư mục con -> tệp tin).`,
    objectives:[
      "Thực hành và thành thạo các kỹ năng tạo, đổi tên, sao chép, di chuyển và xóa tệp/thư mục trên hệ điều hành Windows."
    ],
    highlights:[
      {icon:"📁",title:"Thiết lập danh mục và điều hướng",text:"Truy cập vào File Explorer để xây dựng hệ thống phân cấp thư mục có hệ thống và tổ chức không gian làm việc kỹ thuật số"},
      {icon:"✏️",title:"Tạo và sửa đổi tệp",text:"Tạo các tài liệu mới và sử dụng chức năng Đổi tên (Rename) để đảm bảo việc nhận diện tệp rõ ràng và chuyên nghiệp"},
      {icon:"",title:"Sao chép dữ liệu (Copy & Paste)",text:"Thực hiện các lệnh sao chép để nhân bản các tệp quan trọng sang các danh mục khác nhau nhằm quản lý dữ liệu hiệu quả"},
      {icon:"",title:"Di chuyển và tổ chức tệp (Cut & Paste)",text:"Di chuyển các tệp giữa các thư mục để tối ưu hóa cấu trúc lưu trữ và duy trì quy trình làm việc chuyên nghiệp"}
    ],
    files:[
      {name:"Project Report",       type:"mp4",  typeColor:"#EF5350",bgColor:"rgba(239,83,80,.12)",  desc:"Bài tập này bao quát toàn bộ vòng đời của một tệp tin/thư mục.",size:""  , href:"prj1.mp4"}
    ]
  },
  2:{
    num:"02",
    title:"Soft Robotics in Biomedical Rehabilitation",
    tag:"Academic Research · Biomedical Engineering",
    categories:["Research","Soft Robotics","Biomedical","IEEE"],
    accent:"#00FFC6",
    accentAlpha:"rgba(0,255,198,.1)",
    gradient:"linear-gradient(135deg,#fff 0%,#00FFC6 55%,#64FFDA 100%)",
    meta:[
      {label:"Project Type",  value:"Academic Research Paper"},
      {label:"Duration",      value:"Week 3 – 4"},
      {label:"Sources Used",  value:"10 Peer-reviewed Papers"},
      {label:"Deliverable",   value:"Literature Review Report"}
    ],
    overview:`Dự án này nghiên cứu tình trạng hiện tại của các bộ đồ khung robot mềm (soft robotic exosuits) hỗ trợ phục hồi chức năng chi trên cho bệnh nhân sau đột quỵ. Bằng cách sử dụng phương pháp tìm kiếm học thuật hệ thống trên các nền tảng IEEE Xplore, PubMed và Google Scholar, tôi đã xác định, đánh giá và tổng hợp 10 nguồn tài liệu được bình duyệt (peer-reviewed) xuất bản trong khoảng thời gian từ năm 2018 đến năm 2024. Nghiên cứu áp dụng khung tiêu chuẩn CRAAP để kiểm chứng độ tin cậy của nguồn tài liệu và trình bày các phát hiện về hiệu quả lâm sàng, công nghệ bộ truyền động, và kết quả tương tác giữa người và robot.`,
    objectives:[
      "Xây dựng câu hỏi nghiên cứu rõ ràng về lĩnh vực robot mềm trong phục hồi chức năng",
      "Thực hiện tìm kiếm trên các cơ sở dữ liệu học thuật một cách hệ thống bằng các từ khóa mục tiêu",
      "Đánh giá độ tin cậy của nguồn tài liệu bằng khung kiểm chứng CRAAP",
      "Tổng hợp các phát hiện từ 10 bài báo khoa học đã qua bình duyệt thành một bài tổng quan văn liệu (literature review) mạch lạc",
      "Tạo ra danh mục tài liệu tham khảo được định dạng chuẩn xác theo phong cách APA ấn bản lần thứ 7"
    ],
    highlights:[
      {icon:"🦾",title:"Phát hiện Chính (Key Finding)",text:"Liệu pháp sử dụng bộ khung robot mềm (soft exosuit) cho thấy sự cải thiện lớn hơn 32% trong thang điểm Đánh giá Vận động (Motor Assessment Scale) so với việc chỉ sử dụng các liệu pháp truyền thống đơn thuần"},
      {icon:"🔬",title:"Phương pháp Nghiên cứu (Research Method)",text:"Đánh giá hệ thống trên các nền tảng IEEE Xplore, PubMed, Semantic Scholar — Chọn lọc ra 10 nguồn tài liệu tiêu biểu từ hơn 40 nguồn đã được xem xét"},
      {icon:"📊",title:"Chất lượng Nguồn (Source Quality)",text:"8/10 nguồn tài liệu được lập chỉ mục bởi IEEE hoặc Scopus; tất cả đều được xuất bản trong giai đoạn 2018–2024"},
      {icon:"🤝",title:"Thông tin về HRI (HRI Insight)",text:"HRI - Tương tác Người và Robot: Sự tương thích của vật liệu mềm giúp cải thiện đáng kể sự tham gia và động lực của bệnh nhân trong các buổi trị liệu"}
    ],
    files:[
      {name:"Research Report (Full)",       type:"pdf",  typeColor:"#EF5350",bgColor:"rgba(239,83,80,.12)",  desc:"Hoàn thiện bài tổng quan văn liệu bao gồm các phần: Mở đầu, Phương pháp nghiên cứu, Kết quả, Phân tích và Danh mục tài liệu tham khảo theo chuẩn APA.",  size:"", href:"sorfrobotics.pdf"},
    ]
  },
  3:{
    num:"03",
    title:"Prompt Engineering in Learning",
    tag:"AI Applications · Prompt Engineering",
    categories:["Prompt Engineering","ChatGPT","AI Literacy","LLMs"],
    accent:"#CE93D8",
    accentAlpha:"rgba(206,147,216,.1)",
    gradient:"linear-gradient(135deg,#fff 0%,#CE93D8 50%,#00E5FF 100%)",
    meta:[
      {label:"Project Type",  value:"Applied AI Report"},
      {label:"Duration",      value:"Week 5 - 6"},
      {label:"Tools Used",    value:"ChatGPT, Gemini"},
      {label:"Deliverable",   value:"Prompt Engineering Report"}
    ],
    overview:`Dự án này ghi lại quá trình khám phá hệ thống về kỹ thuật đặt câu lệnh (prompt engineering) như một công cụ học tập cho các khái niệm Kỹ thuật Robot phức tạp. Thông qua ba nghiên cứu điển hình — Động học ngược (Inverse Kinematics), Học sâu (Deep Learning) và Mạng thần kinh (Neural Networks) — tôi đã thiết kế và tinh chỉnh các câu lệnh theo vòng lặp từ cấp độ Cơ bản đến Cải thiện và Nâng cao, nhằm phân tích cấu trúc câu lệnh ảnh hưởng thế nào đến chất lượng, độ chính xác và hiệu quả sư phạm của các lời giải thích do AI tạo ra.`,
    objectives:[
      "Hiểu các thành phần của một câu lệnh AI hiệu quả (vai trò, ngữ cảnh, định dạng, các ràng buộc)",
      "Áp dụng khung tiến hóa câu lệnh 3 cấp độ: Cơ bản → Cải thiện → Nâng cao",
      "Phân tích và đánh giá phản biện chất lượng đầu ra của AI qua các lần lặp câu lệnh",
      "Ghi chép các quyết định thiết kế câu lệnh và tác động có thể đo lường được của chúng đối với kết quả đầu ra",
      "Phản tư về việc sử dụng AI một cách có trách nhiệm như một công cụ học tập, chứ không phải là một lối đi tắt"

    docx:`<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect x="4" y="2" width="18" height="24" rx="2" fill="${color}" opacity=".18" stroke="${color}" stroke-width="1.4"/><path d="M18 2v6h6" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/><text x="16" y="20" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="5.5" font-weight="900" fill="${color}">DOC</text></svg>`,
    xlsx:`<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect x="4" y="2" width="18" height="24" rx="2" fill="${color}" opacity=".18" stroke="${color}" stroke-width="1.4"/><path d="M18 2v6h6" stroke="${color}" stroke-width="1.4" stroke-linecap="round"/><text x="16" y="20" text-anchor="middle" font-family="Montserrat,sans-serif" font-size="5.5" font-weight="900" fill="${color}">XLS</text></svg>`,

/* ══ RENDER PROJECT ══ */

    <span class="pn-center">PROJECT ${p.num} / 06</span>
    <a href="#${next}" class="pn-btn${!next?' hidden':''}">
      Project ${next?String(next).padStart(2,'0'):''}
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>`;

  // trigger scroll animations
  requestAnimationFrame(()=>runAnims());
}

/* ══ SCROLL ANIMATIONS ══ */
function runAnims(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        const siblings=Array.from(e.target.parentElement.children).filter(el=>el.classList.contains('anim'));
        const idx=siblings.indexOf(e.target);
        setTimeout(()=>e.target.classList.add('vis'),idx*65);
        obs.unobserve(e.target);
      }
    });
  },{threshold:.08});
  document.querySelectorAll('.anim').forEach(el=>obs.observe(el));
}

/* ══ ROUTER: read hash, re-render on hash change ══ */
function getID(){return parseInt(window.location.hash.replace('#',''))||1;}
function init(){render(getID());}
window.addEventListener('hashchange',()=>{window.scrollTo(0,0);render(getID());});
init();

/* ══ NEURAL NETWORK CANVAS ══ */
const cv=document.getElementById('bgCanvas'),ct=cv.getContext('2d');
let W=cv.width=window.innerWidth,H=cv.height=window.innerHeight;
window.addEventListener('resize',()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight});
const N=42,D=160,nodes=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,p:Math.random()*Math.PI*2}));
(function draw(){
  ct.clearRect(0,0,W,H);
  for(let i=0;i<N;i++){
    const n=nodes[i];
    n.x+=n.vx;n.y+=n.vy;n.p+=.016;
    if(n.x<0||n.x>W)n.vx*=-1;
    if(n.y<0||n.y>H)n.vy*=-1;
    for(let j=i+1;j<N;j++){
      const m=nodes[j],dx=n.x-m.x,dy=n.y-m.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<D){const a=(1-d/D)*.18;ct.beginPath();ct.strokeStyle=`rgba(0,229,255,${a})`;ct.lineWidth=.5;ct.moveTo(n.x,n.y);ct.lineTo(m.x,m.y);ct.stroke();}
    }
    const pm=.5+.5*Math.sin(n.p);
    ct.beginPath();ct.arc(n.x,n.y,1+.5*pm,0,Math.PI*2);ct.fillStyle=`rgba(0,229,255,${.3+.3*pm})`;ct.fill();
  }
  requestAnimationFrame(draw);
})();
</script>
